<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control My Mac 앱 받기</title>
  <meta name="description" content="무료 Mac 동반 앱과 페어링해 손가락 하나로 Mac 전체를 실행할 수 있는 Control My Mac iPhone &amp; iPad 앱을 받으세요.">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/assets/site.css">
  <!--
    The Mac app's setup-guide QR points here (controlmymac.com/get-iphone).
    When the app is live on the App Store, set APP_STORE_URL below to the
    listing URL — this page then instantly redirects there. No Mac app update needed.
  -->
  <script>
    // PLUG IN: the App Store listing URL once the app is approved.
    var APP_STORE_URL = "https://apps.apple.com/app/id6781458180";
    if (APP_STORE_URL) { location.replace(APP_STORE_URL); }
  </script>
  <style>
    .gi-wrap { max-width: 560px; margin: 0 auto; padding: 0 var(--sp-xl);
      min-height: 70vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; gap: var(--sp-l); }
    .gi-badge { font-size: 13px; font-weight: 600; letter-spacing: .02em;
      color: var(--accent, #4F8CFF); text-transform: uppercase; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">콘텐츠로 건너뛰기</a>
  <main id="main" class="gi-wrap">
    <p class="gi-badge">iPhone &amp; iPad용 Control My Mac</p>
    <h1 style="font-size:clamp(1.8rem,6vw,2.6rem);line-height:1.1;margin:0">
      App&nbsp;Store에서 받으세요
    </h1>
    <p style="font-size:1.05rem;line-height:1.6;color:var(--muted,#5b6472);margin:0">
      무료 Mac 앱을 설치하셨네요 — 마지막 조각은 그것과 페어링되는 iPhone &amp; iPad 앱입니다.
      지금 App Store에서 만나보실 수 있습니다. 이 페이지에서 자동으로 이동되지 않으면
      아래 버튼을 누른 다음, Mac 앱의 페어링 코드를 스캔하세요.
    </p>
    <div class="cta-row" style="display:flex;gap:var(--sp-m);flex-wrap:wrap;justify-content:center">
      <a class="btn btn-primary" href="https://apps.apple.com/app/id6781458180">App&nbsp;Store에서 열기</a>
      <a class="btn btn-quiet" href="/ko/">controlmymac.com으로 돌아가기</a>
    </div>
    <p style="font-size:.85rem;color:var(--muted,#5b6472);margin-top:var(--sp-l)">
      계정 없음, 서버 없음 — 당신의 iPhone 또는 iPad와 Mac가 직접, 비공개로 대화합니다.
    </p>
  </main>
<script defer src="/assets/i18n.js"></script>
</body>
</html>
